<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OWNDAYS EXECUTIVE DASHBOARD - DARK EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0B0E14; 
            color: #FFFFFF; 
            margin: 0; 
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        .text-glow-blue { text-shadow: 0 0 15px rgba(56, 189, 248, 0.5), 0 0 30px rgba(56, 189, 248, 0.2); }
        .progress-glow { box-shadow: 0 0 10px rgba(74, 222, 128, 0.6); }

        .card-dark { 
            background-color: #12141A; 
            border: 1px solid #232630; 
            border-radius: 24px; 
            padding: 32px 24px 28px 24px; 
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            min-height: 750px; 
            position: relative;
            overflow: visible; 
            transition: all 0.3s ease;
        }
        
        .card-dark:hover { transform: translateY(-5px); border-color: #374151; box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.7); }

        .btn-primary { background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%); color: #FFFFFF; padding: 14px 28px; border-radius: 12px; font-weight: 700; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); transition: all 0.2s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37, 99, 235, 0.4); }
        .btn-danger { background: #1F2937; color: #F87171; padding: 14px 28px; border-radius: 12px; font-weight: 700; font-size: 14px; cursor: pointer; border: 1px solid #374151; display: none; align-items: center; gap: 8px; transition: all 0.2s; }
        .btn-danger:hover { background: #374151; transform: translateY(-2px); }

        .badge-container { position: absolute; top: 24px; right: 24px; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; z-index: 20; }
        .badge-item { padding: 6px 12px; font-size: 10px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .badge-crown { background: linear-gradient(135deg, #FDE047, #F59E0B); color: #713F12; } 
        .badge-topup { background: linear-gradient(135deg, #34D399, #059669); color: #FFFFFF; } 
        .badge-alert { background: linear-gradient(135deg, #EF4444, #B91C1C); color: #FFFFFF; }

        .staff-name-text { display: block !important; font-size: 38px !important; font-weight: 900 !important; letter-spacing: -1px !important; text-align: left; margin-top: -16px !important; margin-bottom: 0px !important; line-height: 1.4 !important; padding-bottom: 4px !important; white-space: nowrap !important; overflow: visible !important; }
        .staff-role-text { text-align: left; margin-top: -10px !important; margin-bottom: 24px !important; }

        #loading-screen { display: none; }
        .cyber-loader { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #1F2937; border-top-color: #3B82F6; animation: spin 1s linear infinite; margin: 0 auto 24px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .card-enter { opacity: 0; transform: translateY(20px); animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUpFade { to { opacity: 1; transform: translateY(0); } }

        /* =========================================
           ✨ PROFESSIONAL LOADING SCREEN ✨
           ========================================= */
        .export-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(11, 14, 20, 0.95);
            backdrop-filter: blur(10px);
            z-index: 999999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
        }
        .export-active { opacity: 1; pointer-events: all; }
        .export-spinner {
            width: 50px; height: 50px; border-radius: 50%;
            border: 4px solid #1F2937; border-top-color: #3B82F6;
            animation: spin 1s linear infinite; margin-bottom: 24px;
        }
        .export-text {
            font-size: 16px; font-weight: 800; letter-spacing: 2px;
            text-transform: uppercase; color: #9CA3AF;
            animation: pulse 1.5s ease-in-out infinite alternate;
        }
        @keyframes pulse { 0% { opacity: 0.6; } 100% { opacity: 1; } }

        /* PDF LOCK SETTINGS */
        body.exporting-mode { width: 1440px !important; min-width: 1440px !important; max-width: 1440px !important; margin: 0 auto !important; background-color: #0B0E14 !important; overflow: visible !important; }
        body.exporting-mode #export-page-1, body.exporting-mode #export-page-2 { width: 1440px !important; min-width: 1440px !important; padding: 40px !important; background-color: #0B0E14 !important; }
        body.exporting-mode .grid-summary { display: grid !important; grid-template-columns: repeat(3, minmax(0, 1fr)) !important; gap: 2rem !important; }
        body.exporting-mode .grid-charts { display: grid !important; grid-template-columns: 1fr !important; gap: 2rem !important; }
        body.exporting-mode .grid-staff { display: grid !important; grid-template-columns: repeat(4, minmax(0, 1fr)) !important; gap: 2rem !important; }
        body.exporting-mode .card-dark { transform: none !important; box-shadow: none !important; animation: none !important; opacity: 1 !important; border-color: #374151 !important; transition: none !important; }
    </style>
</head>
<body class="bg-[#0B0E14]" id="main-body">
    
    <div id="export-screen" class="export-overlay">
        <div class="export-spinner"></div>
        <div class="export-text">LOADING...</div>
    </div>

    <div class="max-w-[1440px] mx-auto pb-20" id="main-container">
        
        <div id="export-page-1" class="p-6 md:p-10 bg-[#0B0E14]">
            
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center bg-[#12141A] p-6 md:p-8 rounded-3xl border border-[#232630] mb-8 gap-6">
                <div>
                    <h1 class="text-3xl md:text-4xl font-black tracking-tight text-white uppercase">
                        Executive <span class="text-[#3B82F6]">Dashboard</span>
                    </h1>
                    <p class="text-gray-400 font-semibold tracking-widest text-[11px] uppercase mt-2" id="store-title">Store Performance Insight</p>
                </div>
                <div class="flex items-center gap-3 action-buttons" data-html2canvas-ignore="true">
                    <input type="file" id="csvFileInput" accept=".csv" class="hidden">
                    <label for="csvFileInput" class="btn-primary">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                        Upload CSV Report
                    </label>
                    <button id="btn-export-pdf" class="btn-danger">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                        Export PDF
                    </button>
                </div>
            </div>

            <div id="emptyState" class="text-center py-32 bg-[#12141A] rounded-3xl border border-[#232630]">
                <div class="text-5xl mb-5 opacity-20">📈</div>
                <h2 class="text-xl font-bold text-gray-400">Please Upload Staff KPI Report (.csv)</h2>
            </div>

            <div id="loading-screen" class="flex-col items-center justify-center py-32 bg-[#12141A] rounded-3xl border border-[#232630]">
                <div class="cyber-loader"></div>
                <h2 class="text-xl font-bold text-white animate-pulse">Processing Data...</h2>
            </div>

            <div id="dashboardPage1" class="space-y-8 hidden">
                
                <div class="grid-summary grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="bg-[#12141A] border border-[#232630] rounded-2xl p-6 border-t-4 border-t-[#3B82F6] flex flex-col justify-center">
                        <div class="text-gray-400 text-[11px] font-bold tracking-widest mb-1 uppercase">Net Revenue (Ex. VAT)</div>
                        <div id="summary-revenue" class="text-4xl font-black text-white mt-2 tracking-tight" style="text-shadow: 0 0 15px rgba(56, 189, 248, 0.5);">฿0</div>
                    </div>
                    <div class="bg-[#12141A] border border-[#232630] rounded-2xl p-6 border-t-4 border-t-[#4ADE80] flex flex-col justify-center">
                        <div class="text-gray-400 text-[11px] font-bold tracking-widest mb-1 uppercase">Store Top-Up Rate</div>
                        <div id="summary-topup" class="text-4xl font-black text-[#4ADE80] mt-2 tracking-tight" style="text-shadow: 0 0 15px rgba(74,222,128,0.4);">0%</div>
                    </div>
                    <div class="bg-[#12141A] border border-[#232630] rounded-2xl p-6 border-t-4 border-t-[#EF4444] flex flex-col justify-center">
                        <div class="text-gray-400 text-[11px] font-bold tracking-widest mb-1 uppercase">Void Transactions</div>
                        <div class="text-4xl font-black text-[#EF4444] mt-2 tracking-tight flex items-baseline gap-2" style="text-shadow: 0 0 15px rgba(239,68,68,0.4);">
                            <span id="summary-void">0</span> <span class="text-lg font-bold text-[#FCA5A5]">Bills</span>
                        </div>
                        <div class="text-xs font-semibold text-gray-500 mt-2">Void Value: <span id="summary-void-amt" class="text-gray-300">฿0</span></div>
                    </div>
                </div>

                <div class="grid-charts grid grid-cols-1 gap-8">
                    <div class="bg-[#12141A] border border-[#232630] rounded-2xl p-6 flex flex-col h-[400px]">
                        <h2 class="text-[11px] font-bold text-gray-400 tracking-widest mb-6 uppercase">Sales & Top-Up Analysis</h2>
                        <div id="mixedChartContainer" class="relative w-full flex-grow"><canvas id="mixedChart"></canvas></div>
                    </div>
                    <div class="bg-[#12141A] border border-[#232630] rounded-2xl p-6 flex flex-col h-[400px]">
                        <h2 class="text-[11px] font-bold text-gray-400 tracking-widest mb-6 uppercase">Workload Distribution</h2>
                        <div id="workloadChartContainer" class="relative w-full flex-grow"><canvas id="workloadBarChart"></canvas></div>
                    </div>
                </div>

            </div>
        </div> 

        <div id="export-page-2" class="p-6 md:p-10 bg-[#0B0E14] hidden">
            <div class="flex items-center gap-4 mb-8 px-2">
                <div class="h-8 w-1.5 bg-[#3B82F6] rounded-full shadow-[0_0_10px_#3B82F6]"></div>
                <h2 class="text-2xl font-black text-white tracking-tight">Individual Performance</h2>
            </div>
            
            <div id="staffCardsContainer" class="grid-staff grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-8">
            </div>
        </div>

    </div>

    <iframe id="pdf-iframe" style="position: absolute; top: -9999px; left: -9999px; width: 1440px; height: 1000px; border: none; z-index: -9999;"></iframe>

    <script>
        Chart.defaults.animation = false;
        Chart.defaults.color = "#9CA3AF"; 
        Chart.defaults.font.family = "'Inter', sans-serif"; 
        Chart.defaults.font.size = 11;
        
        let mixedChartInstance = null; let workloadChartInstance = null;
        const palette = ['#06B6D4', '#10B981', '#F59E0B', '#8B5CF6', '#EC4899', '#3B82F6', '#EAB308', '#6366F1', '#14B8A6', '#84CC16', '#F43F5E'];

        function truncateText(str, maxLength) {
            if (!str) return '';
            return str.length > maxLength ? str.substring(0, maxLength) + '...' : str;
        }

        document.getElementById('csvFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            let fileName = file.name;
            let titleEl = document.getElementById('store-title');
            if(fileName.includes('Staff_KPI_Report_Store_')) {
                titleEl.innerText = fileName.replace('.csv', '').replace(/_/g, ' ');
            }

            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('dashboardPage1').classList.add('hidden');
            document.getElementById('export-page-2').classList.add('hidden');
            
            document.getElementById('btn-export-pdf').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'flex';

            Papa.parse(file, {
                header: true, skipEmptyLines: true,
                complete: function(results) {
                    const processedData = processCSVData(results.data);
                    setTimeout(() => {
                        document.getElementById('loading-screen').style.display = 'none';
                        applyDashboardData(processedData);
                    }, 500);
                }
            });
        });

        function processCSVData(data) {
            let summary = { revenue: 0, topupCount: 0, salesCount: 0, voidCount: 0, voidAmt: 0 };
            const staff = {};
            const initStaff = (name) => {
                if (name && name !== '-' && name !== 'N/A' && !staff[name]) {
                    staff[name] = { r: 0, s: 0, t: 0, v: 0, e: 0, c: 0, eg: 0, d: 0, lenses: {} };
                }
            };

            data.forEach(row => {
                let typeKey = Object.keys(row).find(k => k.includes('TYPE'));
                let type = typeKey && row[typeKey] ? row[typeKey].trim().toUpperCase() : '';
                let amount = parseFloat(row['AMOUNT']) || 0;
                let isVoid = (type === 'VOID');
                
                let saleName = row['SALE'] ? row['SALE'].trim().toUpperCase() : '';
                if(saleName === "") saleName = "SUPPORT";

                initStaff(saleName);

                if(isVoid) { 
                    summary.voidCount++; 
                    summary.voidAmt += Math.abs(amount); 
                    staff[saleName].v++;
                } else { 
                    summary.revenue += amount; 
                    summary.salesCount++; 
                    staff[saleName].r += amount;
                    staff[saleName].s++;
                    
                    let productStr = row['PRODUCT DETAILS'] ? row['PRODUCT DETAILS'].toUpperCase() : '';
                    productStr = productStr.replace(/\[WARRANTY\]\s*ประกัน\s*%\s*สาขาที\s*ชื่อ:\s*ZPELL\s*@\s*FUTURE\s*PARK\s*วันที่\s*ชื่อ:/g, "WARRANTY ZPELL");
                    
                    let products = productStr.split(',').map(p => p.trim());
                    let is_tu = false;
                    
                    for (let p of products) {
                        if (['EYESL', '1.67', '1.74', 'RX', 'EN-T', 'TS', 'PRE', 'COMPAL', 'MC2', 'COL1', 'MIRROR', 'PRES-T', 'SIGNATURE', 'ULTIMATE', 'GOLD'].some(k => p.includes(k))) {
                            is_tu = true; break;
                        }
                    }
                    if (is_tu) {
                        staff[saleName].t++;
                        summary.topupCount++;
                    }
                    
                    products.forEach(p => {
                        if(['EYESL', '1.67', '1.74', 'RX', 'EN-T', 'TS', 'PRE', 'COMPAL', 'MC2', 'COL1', 'MIRROR', 'PRES-T', 'SIGNATURE', 'ULTIMATE', 'GOLD'].some(k => p.includes(k))) {
                            staff[saleName].lenses[p] = (staff[saleName].lenses[p] || 0) + 1;
                        }
                    });
                }

                if (!isVoid) {
                    ['EYECHECK', 'CASHIER', 'EDGING', 'DISPENSING'].forEach(role => {
                        let name = row[role] ? row[role].trim().toUpperCase() : '';
                        if(name && name !== '-' && name !== 'N/A') {
                            initStaff(name);
                            if(role === 'EYECHECK') staff[name].e++;
                            if(role === 'CASHIER') staff[name].c++;
                            if(role === 'EDGING') staff[name].eg++;
                            if(role === 'DISPENSING') staff[name].d++;
                        }
                    });
                }
            });

            for (let s in staff) {
                staff[s].topLenses = Object.entries(staff[s].lenses).sort((a,b)=>b[1]-a[1]).slice(0,5).map(e=>({name: e[0], count: e[1]}));
                delete staff[s].lenses;
            }

            return { summary, staff };
        }

        function applyDashboardData(data) {
            let summary = data.summary;
            let staff = data.staff;

            let storeTopupRate = summary.salesCount > 0 ? (summary.topupCount / summary.salesCount) * 100 : 0;
            document.getElementById('summary-revenue').innerText = '฿' + summary.revenue.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0});
            document.getElementById('summary-topup').innerText = storeTopupRate.toFixed(1) + '%';
            document.getElementById('summary-void').innerText = summary.voidCount;
            document.getElementById('summary-void-amt').innerText = '฿' + summary.voidAmt.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0});

            const staffContainer = document.getElementById('staffCardsContainer');
            
            const sortedStaff = Object.keys(staff)
                                      .filter(k => (staff[k].r > 0 || staff[k].e > 0 || staff[k].v > 0) && k !== "SUPPORT")
                                      .sort((a,b) => staff[b].r - staff[a].r);
            
            let maxTopUpRate = 0;
            sortedStaff.forEach(name => {
                let d = staff[name];
                let tr = d.s > 0 ? (d.t / d.s) * 100 : 0;
                if (tr > maxTopUpRate) { maxTopUpRate = tr; }
            });

            let staffHtml = '';
            sortedStaff.forEach((name, index) => {
                let d = staff[name];
                let color = palette[index % palette.length];
                let tr = d.s > 0 ? (d.t / d.s) * 100 : 0;
                
                let role = "Senior Sales Staff";
                let checkName = name.toUpperCase();
                if (checkName === "TROY") role = "Shop Manager";
                else if (checkName === "BUDDH" || checkName === "BUDD") role = "Assistant Shop Manager";

                let badgeHtml = '';
                if (index === 0 && d.r > 0) badgeHtml += `<div class="badge-item badge-crown">👑 HIGHEST SALE</div>`;
                if (tr === maxTopUpRate && tr > 0) badgeHtml += `<div class="badge-item badge-topup">💎 TOP UP MASTER</div>`;
                if (d.v > 0) badgeHtml += `<div class="badge-item badge-alert">⚠️ VOIDS: ${d.v}</div>`;

                let combinedBadges = badgeHtml ? `<div class="badge-container">${badgeHtml}</div>` : '';

                let lensesHtml = d.topLenses.length > 0 
                    ? d.topLenses.map(l => `<div class="flex justify-between items-start text-[13px] font-medium pb-3"><span class="text-gray-300 pr-2 truncate block" style="line-height: normal; padding-bottom: 4px;" title="${l.name}">${truncateText(l.name, 28)}</span><span class="font-black text-white flex-shrink-0 block" style="line-height: normal;">${l.count}</span></div>`).join('')
                    : `<div class="text-[13px] text-gray-500 text-center py-4 block" style="line-height: normal;">No Lens Data Available</div>`;

                let delay = 0.6 + (index * 0.1); 

                staffHtml += `
                    <div class="card-dark card-enter" style="animation-delay: ${delay}s; border-top: 4px solid ${color};">
                        
                        ${combinedBadges}
                        
                        <div class="flex-none pr-28 relative z-10">
                            <div class="staff-name-text text-white" title="${name}">${name}</div>
                            <div class="staff-role-text text-[13px] font-bold text-gray-500">${role}</div>
                        </div>

                        <div class="flex-none bg-[#161922] rounded-2xl p-6 mb-6 border border-[#232630]">
                            <div class="text-gray-500 text-[10px] font-bold tracking-widest mb-3 uppercase">Sale Revenue</div>
                            <div class="text-[36px] font-black text-white mb-6 tracking-tight leading-none" style="text-shadow: 0 0 20px ${color}40;">฿${d.r.toLocaleString(undefined, {minimumFractionDigits: 0})}</div>
                            
                            <div class="flex justify-between items-end mb-2">
                                <div class="text-gray-500 text-[10px] font-bold uppercase tracking-widest">Top-Up Rate</div>
                                <div class="text-[14px] font-black text-[#4ADE80]">${tr.toFixed(1)}%</div>
                            </div>
                            <div class="w-full bg-[#232630] rounded-full h-[6px] overflow-hidden">
                                <div class="bg-[#4ADE80] h-[6px] rounded-full" style="width: ${tr}%; box-shadow: 0 0 10px #4ADE8080;"></div>
                            </div>
                        </div>

                        <div class="flex-grow flex flex-col mb-4">
                            <div class="text-gray-500 text-[10px] font-bold tracking-widest mb-4 uppercase">Top 5 Paid Lenses Sold</div>
                            <div class="space-y-1">
                                ${lensesHtml}
                            </div>
                        </div>

                        <div class="flex-none flex justify-between items-center py-4 border-t border-[#232630] mb-2 mt-auto">
                            <div class="text-gray-500 text-[10px] font-bold tracking-widest uppercase">Void Transactions</div>
                            <div class="font-black text-[15px] ${d.v > 0 ? 'text-[#EF4444]' : 'text-white'}">${d.v}</div>
                        </div>

                        <div class="flex-none grid grid-cols-4 gap-3">
                            <div class="bg-[#161922] border border-[#232630] rounded-xl p-3 flex flex-col items-center justify-center">
                                <div class="text-[10px] font-bold text-gray-500 mb-1 uppercase">Eye</div>
                                <div class="font-black text-[22px] leading-none" style="color: ${color};">${d.e}</div>
                            </div>
                            <div class="bg-[#161922] border border-[#232630] rounded-xl p-3 flex flex-col items-center justify-center">
                                <div class="text-[10px] font-bold text-gray-500 mb-1 uppercase">Cash</div>
                                <div class="font-black text-[22px] leading-none" style="color: ${color};">${d.c}</div>
                            </div>
                            <div class="bg-[#161922] border border-[#232630] rounded-xl p-3 flex flex-col items-center justify-center">
                                <div class="text-[10px] font-bold text-gray-500 mb-1 uppercase">Edge</div>
                                <div class="font-black text-[22px] leading-none" style="color: ${color};">${d.eg}</div>
                            </div>
                            <div class="bg-[#161922] border border-[#232630] rounded-xl p-3 flex flex-col items-center justify-center">
                                <div class="text-[10px] font-bold text-gray-500 mb-1 uppercase">Disp</div>
                                <div class="font-black text-[22px] leading-none" style="color: ${color};">${d.d}</div>
                            </div>
                        </div>
                    </div>
                `;
            });
            staffContainer.innerHTML = staffHtml;

            renderCharts(staff, sortedStaff);
            
            document.getElementById('dashboardPage1').classList.remove('hidden');
            document.getElementById('export-page-2').classList.remove('hidden');
            document.getElementById('btn-export-pdf').style.display = 'inline-flex';
        }

        function renderCharts(staff, sortedNames) {
            const ctxMain = document.getElementById('mixedChart').getContext('2d');
            if(mixedChartInstance) mixedChartInstance.destroy();
            mixedChartInstance = new Chart(ctxMain, {
                type: 'bar',
                data: {
                    labels: sortedNames,
                    datasets: [
                        { label: 'Net Sales (THB)', data: sortedNames.map(n => staff[n].r), backgroundColor: sortedNames.map((n, i) => palette[i % palette.length]), borderRadius: 6, yAxisID: 'y' },
                        { label: 'Top-Up Rate (%)', data: sortedNames.map(n => staff[n].s > 0 ? (staff[n].t / staff[n].s * 100).toFixed(1) : 0), type: 'line', borderColor: '#3B82F6', backgroundColor: '#3B82F6', borderWidth: 2, pointBackgroundColor: '#12141A', pointBorderColor: '#3B82F6', pointBorderWidth: 2, pointRadius: 4, yAxisID: 'y1' }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { grid: { color: '#2A2D35', borderDash: [4, 4] }, beginAtZero: true, ticks: {color: '#9CA3AF'} }, y1: { position: 'right', grid: { display: false }, min: 0, ticks: {color: '#9CA3AF'} }, x: { grid: { display: false }, ticks: {color: '#9CA3AF'} } } }
            });

            const ctxWorkload = document.getElementById('workloadBarChart').getContext('2d');
            if(workloadChartInstance) workloadChartInstance.destroy();
            
            const workloadDatasets = sortedNames.map((name, i) => { 
                return { label: name, data: [staff[name].e, staff[name].c, staff[name].eg, staff[name].d], backgroundColor: palette[i % palette.length], borderRadius: 4 };
            });

            workloadChartInstance = new Chart(ctxWorkload, {
                type: 'bar',
                data: { labels: ['EXAM', 'CASHIER', 'EDGING', 'DISPENSE'], datasets: workloadDatasets },
                options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { display: false }, ticks: {color: '#9CA3AF'} }, y: { min: 0, grid: { color: '#2A2D35', borderDash: [4, 4] }, ticks: {color: '#9CA3AF'} } } }
            });
        }

        document.getElementById('btn-export-pdf').addEventListener('click', async function() {
            const originalBtnText = this.innerHTML;
            
            const exportScreen = document.getElementById('export-screen');
            exportScreen.classList.add('export-active');
            
            this.style.pointerEvents = 'none';
            this.style.opacity = '0.7';
            
            document.querySelector('.action-buttons').style.display = 'none';
            window.scrollTo(0, 0);

            document.body.classList.add('exporting-mode');

            const mixedCanvas = document.getElementById('mixedChart');
            const workloadCanvas = document.getElementById('workloadBarChart');
            
            const mixedImg = document.createElement('img');
            mixedImg.src = mixedChartInstance.toBase64Image();
            mixedImg.style.width = '100%';
            mixedImg.style.height = '100%';
            mixedImg.id = 'tempMixedImg';
            
            const workloadImg = document.createElement('img');
            workloadImg.src = workloadChartInstance.toBase64Image();
            workloadImg.style.width = '100%';
            workloadImg.style.height = '100%';
            workloadImg.id = 'tempWorkloadImg';

            mixedCanvas.style.display = 'none';
            workloadCanvas.style.display = 'none';
            document.getElementById('mixedChartContainer').appendChild(mixedImg);
            document.getElementById('workloadChartContainer').appendChild(workloadImg);

            await new Promise(r => setTimeout(r, 1000));

            try {
                const { jsPDF } = window.jspdf;
                const pdfWidth = 1440; 
                let pdf = null;
                const page1 = document.getElementById('export-page-1');
                const page2 = document.getElementById('export-page-2');

                page1.style.display = 'block';
                page2.style.display = 'none';

                const canvas1 = await html2canvas(page1, { 
                    scale: 2, useCORS: true, backgroundColor: '#0B0E14', width: 1440, windowWidth: 1440 
                });
                const imgData1 = canvas1.toDataURL('image/jpeg', 0.98); 
                const pdfHeight1 = page1.scrollHeight;
                
                pdf = new jsPDF({ orientation: pdfWidth > pdfHeight1 ? 'landscape' : 'portrait', unit: 'px', format: [pdfWidth, pdfHeight1] });
                pdf.addImage(imgData1, 'JPEG', 0, 0, pdfWidth, pdfHeight1);

                page1.style.display = 'none';
                page2.style.display = 'block';

                const canvas2 = await html2canvas(page2, { 
                    scale: 2, useCORS: true, backgroundColor: '#0B0E14', width: 1440, windowWidth: 1440 
                });
                const imgData2 = canvas2.toDataURL('image/jpeg', 0.98); 
                const pdfHeight2 = page2.scrollHeight;

                pdf.addPage([pdfWidth, pdfHeight2], pdfWidth > pdfHeight2 ? 'landscape' : 'portrait');
                pdf.addImage(imgData2, 'JPEG', 0, 0, pdfWidth, pdfHeight2);

                pdf.save(document.getElementById('store-title').innerText + '-Report.pdf');

            } catch (err) {
                console.error("Export Error: ", err);
                alert("มีบางอย่างผิดพลาด โปรดลองใหม่อีกครั้ง");
            } finally {
                document.getElementById('export-page-1').style.display = 'block';
                document.getElementById('export-page-2').style.display = 'block';
                
                document.getElementById('tempMixedImg')?.remove();
                document.getElementById('tempWorkloadImg')?.remove();
                mixedCanvas.style.display = 'block';
                workloadCanvas.style.display = 'block';

                document.body.classList.remove('exporting-mode');
                document.querySelector('.action-buttons').style.display = 'flex';

                this.style.pointerEvents = 'auto';
                this.style.opacity = '1';
                
                if(mixedChartInstance) mixedChartInstance.resize();
                if(workloadChartInstance) workloadChartInstance.resize();
                
                exportScreen.classList.remove('export-active');
            }
        });
    </script>
</body>
</html>
